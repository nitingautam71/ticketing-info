name: CI

on:
  pull_request:
  push:
    branches: [main, nextjs-migration]

env:
  # Placeholder — never a real database connection. prisma generate only needs
  # the env var to exist; the build/tests never open a live connection.
  DATABASE_URL: "postgresql://user:password@localhost:5432/ci_placeholder"
  ADMIN_PASSWORD: "ci-placeholder"
  # google-ads-api ships enormous generated type definitions; tsc/next-build OOM
  # on the default Node heap without this.
  NODE_OPTIONS: "--max-old-space-size=6144"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
