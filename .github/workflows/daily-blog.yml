name: Daily Blog Post

# Runs 08:00 IST daily (IST = UTC+5:30, so 02:30 UTC).
on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Generate + validate + build only; do not push a branch or open a PR'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-blog
  cancel-in-progress: false

env:
  # Placeholders only, for `npm ci` (prisma generate) and `npm run build` in this
  # workflow - mirrors .github/workflows/ci.yml. Never a real DB connection, and
  # unrelated to the real ADMIN_PASSWORD secret used by publish-blog-on-merge.yml.
  DATABASE_URL: 'postgresql://user:password@localhost:5432/ci_placeholder'
  ADMIN_PASSWORD: 'ci-placeholder'
  # google-ads-api ships enormous generated type definitions; next-build OOMs on
  # the default Node heap without this (mirrors ci.yml).
  NODE_OPTIONS: '--max-old-space-size=6144'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Compute today's date (IST calendar day)
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Build research prompt
        env:
          TODAY: ${{ steps.date.outputs.today }}
        run: node scripts/blog/build-prompt.mjs > "$RUNNER_TEMP/blog-prompt.txt"

      - name: Generate blog post draft with Claude Code
        id: claude
        env:
          # Uses the Claude Pro/Max subscription (via `claude setup-token`), not
          # ANTHROPIC_API_KEY pay-as-you-go billing. --bare is NOT used here because
          # it forces API-key-only auth and would refuse this token entirely.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p \
            --output-format json \
            --allowedTools Read Glob Grep WebSearch WebFetch Write \
            --max-budget-usd 3 \
            < "$RUNNER_TEMP/blog-prompt.txt" \
            > "$RUNNER_TEMP/claude-output.json" || true
        continue-on-error: true

      - name: Validate generated draft
        id: validate
        env:
          TODAY: ${{ steps.date.outputs.today }}
          CLAUDE_OUTPUT_FILE: ${{ runner.temp }}/claude-output.json
        run: node scripts/blog/validate-draft.mjs
        continue-on-error: true

      - name: Build
        id: build
        if: steps.validate.outcome == 'success'
        run: npm run build 2>&1 | tee "$RUNNER_TEMP/blog-build.log"
        continue-on-error: true

      - name: Create branch and commit draft
        id: commit
        if: >
          steps.validate.outcome == 'success' && steps.build.outcome == 'success' &&
          github.event.inputs.dry_run != 'true'
        env:
          TODAY: ${{ steps.date.outputs.today }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "blog-drafts/$TODAY"
          git add content/blog-drafts/
          git commit -m "blog: daily travel news – $TODAY"
          git push origin "blog-drafts/$TODAY"

      - name: Open pull request
        id: pr
        if: steps.commit.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ steps.date.outputs.today }}
        run: |
          gh pr create \
            --base main \
            --head "blog-drafts/$TODAY" \
            --title "$(cat "$RUNNER_TEMP/blog-title.txt")" \
            --body-file "$RUNNER_TEMP/blog-body.md"

      # No human review gate, by explicit request: the PR above exists only as a
      # git history / audit trail record, not a review checkpoint.
      - name: Auto-merge pull request
        id: automerge
        if: steps.pr.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ steps.date.outputs.today }}
        run: gh pr merge "blog-drafts/$TODAY" --merge --delete-branch

      # publish-blog-on-merge.yml does NOT fire for this merge: GitHub's anti-recursion
      # protection means a merge performed with the default GITHUB_TOKEN (as above)
      # never triggers other workflows, only merges done with a real user credential
      # do (confirmed: it fired correctly for a manually-merged PR, but never ran at
      # all for this auto-merge step). So this step publishes directly instead of
      # relying on that trigger.
      - name: Publish auto-merged post live
        if: steps.automerge.outcome == 'success'
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          export DRAFT_FILES=$(cat "$RUNNER_TEMP/blog-draft-path.txt")
          node scripts/blog/publish-draft.mjs

      - name: Dry-run summary
        if: >
          steps.validate.outcome == 'success' && steps.build.outcome == 'success' &&
          github.event.inputs.dry_run == 'true'
        env:
          TODAY: ${{ steps.date.outputs.today }}
        run: |
          echo "Dry run: draft generated and validated, build passed. No branch/PR created."
          echo "Title: $(cat "$RUNNER_TEMP/blog-title.txt")"
          echo "--- content/blog-drafts/${TODAY}-*.json ---"
          cat content/blog-drafts/"$TODAY"-*.json

      - name: Record failure
        if: steps.validate.outcome != 'success' || steps.build.outcome == 'failure'
        env:
          TODAY: ${{ steps.date.outputs.today }}
        run: |
          {
            echo "# Daily blog generation failed - $TODAY"
            echo
            echo "Validation step: ${{ steps.validate.outcome }}"
            echo "Build step: ${{ steps.build.outcome }}"
            echo
            if [ -f "$RUNNER_TEMP/blog-error.md" ]; then
              cat "$RUNNER_TEMP/blog-error.md"
            fi
            if [ -f "$RUNNER_TEMP/blog-build.log" ]; then
              echo
              echo "## Build log (last 200 lines)"
              echo '```'
              tail -n 200 "$RUNNER_TEMP/blog-build.log"
              echo '```'
            fi
          } > "$RUNNER_TEMP/failure-report.md"
          cat "$RUNNER_TEMP/failure-report.md"

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "::error::Dry run failed during generation/validation/build - see the report above. Nothing was pushed to the repo."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "FAILED-$TODAY"
          mkdir -p .github/blog-failures
          cp "$RUNNER_TEMP/failure-report.md" ".github/blog-failures/$TODAY.md"
          git add .github/blog-failures
          git commit -m "blog: FAILED daily generation – $TODAY"
          git push origin "FAILED-$TODAY"
          echo "::error::Daily blog generation failed - see .github/blog-failures/$TODAY.md on branch FAILED-$TODAY"
          exit 1
