name: Publish Blog Draft on Merge

# The only workflow that touches production. Fires when a blog-drafts/* PR is
# merged to main, and calls the site's existing /api/admin/blog endpoint to
# create the post live - never writes to the database directly.
on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      draft_file:
        description: >
          Path to a content/blog-drafts/*.json file already on main to (re)publish,
          e.g. content/blog-drafts/2026-07-21-foo.json. Recovery hatch for when a
          draft merged successfully but the publish step itself failed (e.g. bad
          JSON that only validate-draft.mjs's repair caught).
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  publish:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'blog-drafts/'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.event.pull_request.base.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Find draft files added by this PR
        id: files
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          files=$(gh pr view "$PR_NUMBER" --json files -q '.files[].path' | grep '^content/blog-drafts/.*\.json$' || true)
          echo "Draft files in this PR:"
          echo "$files"
          {
            echo "files<<BLOG_FILES_EOF"
            echo "$files"
            echo "BLOG_FILES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish draft(s) via admin API
        if: github.event_name == 'workflow_dispatch' || steps.files.outputs.files != ''
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DRAFT_FILES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft_file || steps.files.outputs.files }}
        run: node scripts/blog/publish-draft.mjs

      - name: No draft files found
        if: github.event_name == 'pull_request' && steps.files.outputs.files == ''
        run: echo "No content/blog-drafts/*.json files in this PR - nothing to publish."
